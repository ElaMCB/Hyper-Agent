# Hyper-Agent config
# Paths are relative to repo root unless absolute.

# Azure DevOps: set enabled: true, organization + project (or use AZDO_ORG / AZDO_PROJECT in .env)
azure_devops:
  enabled: false
  organization: ""
  project: ""
  pat_env: AZDO_PAT
  max_items: 75
  # wiql: |   # optional custom WIQL (must return Bug work items)

data:
  dir: data
  # Files to use for brief (names or paths under data.dir)
  defects_file: defects.json
  test_runs_file: test_runs.json

llm:
  enabled: false
  provider: openai
  model: gpt-4o-mini

brief:
  # Number of bullets before "Suggested focus"
  max_bullets: 5

# Timestamped brief artifacts (audit: "what did Shadow know at standup?")
output:
  briefs_dir: output/briefs
  save_on_cli: true
  save_on_api: false

# Daily "Headquarters" HTML: open output/headquarters/latest.html each morning
headquarters:
  dir: output/headquarters
  write_latest: true
  title: "Shadow — Headquarters"
  # Optional shortcuts (ADO, dashboards, wiki) — same snapshot, fewer tabs to open
  links: []
  # links:
  #   - label: "Azure DevOps"
  #     url: "https://dev.azure.com/your-org/your-project"
  #   - label: "Test results dashboard"
  #     url: "https://..."
