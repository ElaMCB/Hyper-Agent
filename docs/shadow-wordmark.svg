<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 112" role="img" aria-labelledby="wmTitle">
  <title id="wmTitle">Shadow - AI test architect</title>
  <defs>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="readmeWordDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#f5f6f8" stop-opacity="1"/>
      <stop offset="0.2" stop-color="#e8eaed" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#e8eaed" stop-opacity="0.72"/>
      <stop offset="0.55" stop-color="#c5cad3" stop-opacity="0.32"/>
      <stop offset="0.72" stop-color="#8b929b" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6b7280" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="readmeEchoDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.4"/>
      <stop offset="0.38" stop-color="#b8962e" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#8b929b" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#8b929b" stop-opacity="0"/>
    </linearGradient>
    <filter id="readmeShade" x="-8%" y="-12%" width="116%" height="135%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#d4af37" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="520" height="112" rx="18" fill="#0c0e11"/>
  <rect width="520" height="112" rx="18" fill="url(#heroGlow)"/>
  <rect x="0.5" y="0.5" width="519" height="111" rx="17.5" fill="none" stroke="#2a313c" stroke-width="1"/>
  <rect x="24" y="0" width="472" height="3" rx="1.5" fill="#d4af37" opacity="0.55"/>
  <text x="264" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="56" font-weight="700" letter-spacing="-0.03em" fill="url(#readmeEchoDissolve)">Shadow</text>
  <g filter="url(#readmeShade)">
    <text x="260" y="70" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="56" font-weight="700" letter-spacing="-0.03em" fill="url(#readmeWordDissolve)">Shadow</text>
  </g>
</svg>
