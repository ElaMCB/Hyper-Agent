  <text x="16.8" y="22.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="17" font-weight="700" letter-spacing="-0.04em" fill="url(#favEchoDissolve)">S</text>
  <g filter="url(#favShade)">
    <text x="16" y="22" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="17" font-weight="700" letter-spacing="-0.04em" fill="url(#favWordDissolve)">S</text>
