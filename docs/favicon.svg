<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Shadow">
  <defs>
    <linearGradient id="favHeroGlow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#d4af37" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="favWordDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#f5f6f8" stop-opacity="1"/>
      <stop offset="0.35" stop-color="#e8eaed" stop-opacity="0.85"/>
      <stop offset="0.65" stop-color="#c5cad3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6b7280" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="favEchoDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#b8962e" stop-opacity="0.12"/>
