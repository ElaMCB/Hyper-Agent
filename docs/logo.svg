<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 38" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Shadow</title>
  <defs>
    <linearGradient id="navHeroGlow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="navWordDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#f5f6f8" stop-opacity="1"/>
      <stop offset="0.2" stop-color="#e8eaed" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#e8eaed" stop-opacity="0.72"/>
      <stop offset="0.55" stop-color="#c5cad3" stop-opacity="0.32"/>
      <stop offset="0.72" stop-color="#8b929b" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6b7280" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="navEchoDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.4"/>
      <stop offset="0.38" stop-color="#b8962e" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#8b929b" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#8b929b" stop-opacity="0"/>
    </linearGradient>
    <filter id="navShade" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.35" flood-color="#d4af37" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Slightly above nav bg (#0c0e11) so the tile reads on the sticky bar -->
  <rect width="176" height="38" rx="6" fill="#0f1218"/>
  <rect width="176" height="38" rx="6" fill="url(#navHeroGlow)"/>
  <rect x="0.5" y="0.5" width="175" height="37" rx="5.5" fill="none" stroke="#3d4758" stroke-width="1"/>
  <rect x="8" y="0" width="160" height="1.5" rx="0.75" fill="#d4af37" opacity="0.72"/>
  <text x="89.5" y="25.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="19" font-weight="700" letter-spacing="-0.03em" fill="url(#navEchoDissolve)">Shadow</text>
  <g filter="url(#navShade)">
    <text x="88" y="24.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="19" font-weight="700" letter-spacing="-0.03em" fill="url(#navWordDissolve)">Shadow</text>
  </g>
</svg>
