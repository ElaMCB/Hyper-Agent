<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 38" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Shadow</title>
  <defs>
    <!-- Fade maps to each text element's bounding box (reliable vs fixed userSpace coords) -->
    <linearGradient id="wordDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#f0f2f5" stop-opacity="1"/>
      <stop offset="0.22" stop-color="#e8eaed" stop-opacity="1"/>
      <stop offset="0.42" stop-color="#e8eaed" stop-opacity="0.65"/>
      <stop offset="0.58" stop-color="#c5cad3" stop-opacity="0.28"/>
      <stop offset="0.75" stop-color="#8b929b" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#8b929b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="echoDissolve" gradientUnits="objectBoundingBox" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="0.35" stop-color="#d4af37" stop-opacity="0.14"/>
      <stop offset="0.6" stop-color="#8b929b" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#8b929b" stop-opacity="0"/>
    </linearGradient>
    <filter id="navWordShade" x="-15%" y="-25%" width="130%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.25" stdDeviation="1.1" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="2" y="5" width="28" height="28" rx="7" fill="#14181f" stroke="#2a313c" stroke-width="1"/>
  <rect x="7" y="12" width="14" height="10" rx="2" fill="#d4af37" opacity="0.38"/>
  <rect x="9" y="14" width="14" height="10" rx="2" fill="#d4af37"/>
  <text x="39.5" y="26" font-family="Georgia, 'Times New Roman', Times, serif" font-size="17" font-weight="700" letter-spacing="-0.02em" fill="url(#echoDissolve)">Shadow</text>
  <g filter="url(#navWordShade)">
    <text x="38" y="25" font-family="Georgia, 'Times New Roman', Times, serif" font-size="17" font-weight="700" letter-spacing="-0.02em" fill="url(#wordDissolve)">Shadow</text>
  </g>
</svg>
